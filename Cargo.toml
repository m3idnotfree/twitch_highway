[package]
name = "twitch_highway"
version = "0.2.1"
authors = ["m3id"]
edition = "2021"
description = "Twitch API"
documentation = "https://docs.rs/twitch_highway"
repository = "https://github.com/m3idnotfree/twitch_highway.git"
license = "MIT OR Apache-2.0"
keywords = ["twitch", "api", "streaming", "helix", "oauth"]
categories = ["api-bindings", "web-programming"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
ads = []
analytics = []
bits = []
ccls = []
channel-points = []
channels = []
charity = []
chat = []
clips = []
conduits = []
entitlements = []
extensions = []
eventsub = ["axum", "tokio", "rand", "hmac", "sha2", "hex", "subtle", "tokio-tungstenite", "futures-util", "tracing", "tracing-subscriber", "anyhow"]
games = []
goals = []
guest-star = []
hype-train = []
moderation = []
polls = []
predictions = []
raid = []
schedule = []
search = []
streams = []
subscriptions = []
teams = []
users = []
videos = []
whisper = []
mock-api = ["subscriptions", "streams", "videos", "teams"]
full = ["ads", "analytics", "bits", "ccls", "channel-points", "channels", "charity", "chat", "clips", "conduits", "entitlements", "extensions", "eventsub", "games", "goals", "guest-star", "hype-train", "moderation", "polls", "predictions", "raid", "schedule", "search", "streams", "subscriptions", "teams", "users", "videos", "whisper"]
test = ["twitch_oauth_token", "wiremock", "anyhow", "rand"]

axum = ["dep:axum"]
warp = []
tower = []
reqwest = []
hyper = []

actix-web = ["dep:actix-web"]

[dependencies]
asknothingx2-util = { version = "0.1.9", features = ["api", "oauth", "serde"] }
chrono = { version = "0.4.39", features = ["serde"] }
http-serde = "2.1.1"
itoa = "1.0.15"
reqwest = "0.12.22"
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.137"
url = "2.5.4"

rand = { version = "0.9.2", optional = true }

wiremock = { version = "0.6.4", optional = true }
anyhow = { version = "1.0.99", optional = true }


twitch_oauth_token = { version = "2.0.5", features = ["test"], optional = true }

# eventsub
axum = { version = "0.8.4", features = ["ws"], optional = true }
tokio = { version = "1.43.0", features = ["full"], optional = true }
hmac = { version = "0.12.1", optional = true }
sha2 = { version = "0.10.9", optional = true }
hex = { version = "0.4.3", optional = true }
tracing = { version = "0.1.41", optional = true }
tracing-subscriber = { version = "0.3.20", optional = true }
subtle = { version = "2.6.1", optional = true }

# webhook
actix-web = { version = "4.11.0", optional = true }
http = { version = "1.3.1" }

# websocket
tokio-tungstenite = { version = "0.27.0", features = ["rustls-tls-webpki-roots"], optional = true }
futures-util = { version = "0.3.31", optional = true }


[dev-dependencies]
dotenv = "0.15.0"
tokio = { version = "1.43.0", features = ["full"] }

