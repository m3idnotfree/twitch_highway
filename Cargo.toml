[package]
name = "twitch_highway"
version = "0.3.2"
authors = ["m3id"]
edition = "2021"
description = "Twitch API"
documentation = "https://docs.rs/twitch_highway"
repository = "https://github.com/m3idnotfree/twitch_highway.git"
license = "MIT OR Apache-2.0"
keywords = ["api", "helix", "oauth", "streaming", "twitch"]
categories = ["api-bindings", "web-programming"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[[test]]
name = "twitch-cli"
path = "tests/twitch_cli.rs"
required-features = [
  "bits",
  "ccls",
  "channel-points",
  "channels",
  "charity",
  "chat",
  "clips",
  "goals",
  "polls",
  "predictions",
  "raid",
  "search",
  "subscriptions",
  "teams",
  "users",
  "videos",
  "whisper"
]

[dependencies]
# webhook - HeaderAccess trait implementation
actix-http = { version = "3.11.2", optional = true }
asknothingx2-util = { version = "0.1.11", features = ["api", "oauth", "serde"] }
# webhook - IntoResponse for WebhookError
axum-core = { version = "0.5.6", default-features = false, optional = true }
chrono = { version = "0.4.42", features = ["serde"] }
# schedule
chrono-tz = { version = "0.10.4", optional = true }
# websocket
futures-util = { version = "0.3.31", optional = true }
# webhook - signature verification
hex = { version = "0.4.3", optional = true }
hmac = { version = "0.12.1", optional = true }
http = { version = "1.4.0", optional = true }
http-serde = "2.1.1"
itoa = "1.0.17"
# websocket - router
pin-project-lite = { version = "0.2.16", optional = true }
rand = { version = "0.9.2", optional = true }
reqwest = "0.13.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_with = { version = "3.16.1", optional = true }
sha2 = { version = "0.10.9", optional = true }
subtle = { version = "2.6.1", optional = true }
thiserror = { version = "2.0.17", optional = true }
# websocket - client
tokio = { version = "1.49.0", features = [
  "net",
  "rt-multi-thread",
  "sync",
  "time"
], optional = true }
tokio-tungstenite = { version = "0.28.0", features = ["rustls-tls-webpki-roots"], optional = true }
tower = { version = "0.5.3", features = ["limit", "util"], optional = true }
tracing = { version = "0.1.44", optional = true }
twitch_oauth_token = { version = "3.0.1", optional = true }
url = { version = "2.5.8", features = ["serde"] }

[dev-dependencies]
actix-web = "4.12.1"
anyhow = "1.0.100"
axum = { version = "0.8.8", features = ["ws"] }
pin-project-lite = "0.2.16"
rand = "0.9.2"
thiserror = "2.0.17"
tokio = { version = "1.49.0", features = ["full"] }
twitch_highway = { path = ".", features = ["streams"] }
twitch_oauth_token = { version = "3.0.1", features = ["oneshot-server", "test"] }
wiremock = "0.6.5"

[features]
default = []
ads = ["serde_with"]
analytics = []
bits = []
ccls = []
channel-points = []
channels = []
charity = []
chat = []
clips = []
conduits = []
entitlements = []
eventsub = []
extensions = []
full = [
  "ads",
  "analytics",
  "bits",
  "ccls",
  "channel-points",
  "channels",
  "charity",
  "chat",
  "clips",
  "conduits",
  "entitlements",
  "eventsub",
  "extensions",
  "games",
  "goals",
  "guest-star",
  "hype-train",
  "moderation",
  "polls",
  "predictions",
  "raid",
  "schedule",
  "search",
  "streams",
  "subscriptions",
  "teams",
  "users",
  "videos",
  "whisper"
]
games = []
goals = []
guest-star = []
hype-train = []
moderation = []
polls = []
predictions = []
raid = []
schedule = ["chrono-tz", "serde_with"]
search = []
streams = []
subscriptions = []
teams = []
users = ["twitch_oauth_token"]
videos = []
webhook = ["webhook-actix", "webhook-axum"]
webhook-actix = ["actix-http", "webhook-verify"]
webhook-axum = ["axum-core", "webhook-http"]
webhook-http = ["http", "webhook-verify"]
webhook-verify = ["hex", "hmac", "rand", "sha2", "subtle"]
websocket = ["websocket-client", "websocket-router"]
websocket-client = [
  "dep:tower",
  "futures-util",
  "thiserror",
  "tokio",
  "tokio-tungstenite",
  "tracing"
]
websocket-router = ["dep:tower", "futures-util", "pin-project-lite", "tracing"]
whisper = []
