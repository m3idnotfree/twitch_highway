[package]
name = "twitch_highway"
version = "0.2.1"
authors = ["m3id"]
edition = "2021"
description = "Twitch API"
documentation = "https://docs.rs/twitch_highway"
repository = "https://github.com/m3idnotfree/twitch_highway.git"
license = "MIT OR Apache-2.0"
keywords = ["twitch", "api", "streaming", "helix", "oauth"]
categories = ["api-bindings", "web-programming"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
ads = ["serde_with"]
analytics = []
bits = []
ccls = []
channel-points = []
channels = []
charity = []
chat = []
clips = []
conduits = []
entitlements = []
extensions = []
eventsub = []
games = []
goals = []
guest-star = []
hype-train = []
moderation = []
polls = []
predictions = []
raid = []
schedule = ["chrono-tz", "serde_with"]
search = []
streams = []
subscriptions = []
teams = []
users = []
videos = []
whisper = []
full = ["ads", "analytics", "bits", "ccls", "channel-points", "channels", "charity", "chat", "clips", "conduits", "entitlements", "extensions", "eventsub", "games", "goals", "guest-star", "hype-train", "moderation", "polls", "predictions", "raid", "schedule", "search", "streams", "subscriptions", "teams", "users", "videos", "whisper"]

webhook = ["webhook-actix", "webhook-axum"]
webhook-actix = ["actix-http", "webhook-verify"]
webhook-axum = ["axum-core", "webhook-http"]
webhook-http = ["http", "webhook-verify"]
webhook-verify = ["hex", "hmac", "rand", "sha2", "subtle"]

websocket = ["websocket-router", "websocket-client"]
websocket-router = ["dep:tower", "futures-util", "pin-project-lite", "tracing"]
websocket-client = ["dep:tower", "futures-util", "thiserror", "tokio", "tokio-tungstenite", "tracing"]

[dependencies]
asknothingx2-util = { version = "0.1.10", features = ["api", "oauth", "serde"] }
chrono = { version = "0.4.42", features = ["serde"] }
http-serde = "2.1.1"
itoa = "1.0.15"
reqwest = "0.12.23"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
url = "2.5.7"

# webhook - HeaderAccess trait implementation
actix-http = { version = "3.11.2", optional = true }
http = { version = "1.3.1", optional = true }

# webhook - IntoResponse for WebhookError
axum-core = { version = "0.5.5", default-features = false, optional = true }

# webhook - signature verification
hex = { version = "0.4.3", optional = true }
hmac = { version = "0.12.1", optional = true }
rand = { version = "0.9.2", optional = true }
sha2 = { version = "0.10.9", optional = true }
subtle = { version = "2.6.1", optional = true }

# websocket
futures-util = { version = "0.3.31", optional = true }
thiserror = { version = "2.0.17", optional = true }
tracing = { version = "0.1.41", optional = true }
tower = { version = "0.5.2", features = ["limit", "util"], optional = true }

# websocket - router
pin-project-lite = { version = "0.2.16", optional = true }

# websocket - client
tokio = { version = "1.47.1", features = ["net", "rt-multi-thread", "sync", "time"], optional = true }
tokio-tungstenite = { version = "0.28.0", features = ["rustls-tls-webpki-roots"], optional = true }

#schedule
chrono-tz = { version = "0.10.4", optional = true }

serde_with = { version = "3.15.0", optional = true }

[dev-dependencies]
actix-web = "4.11.0"
anyhow = "1.0.100"
axum = { version = "0.8.6", features = ["ws"] }
dotenv = "0.15.0"
pin-project-lite = "0.2.16"
rand = "0.9.2"
regex = "1.11.3"
thiserror = "2.0.17"
tokio = { version = "1.47.1", features = ["full"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "json"] }
twitch_highway = { path = ".", features = ["streams"] }
twitch_oauth_token = { version = "2.0.8", features = ["test"] }
wiremock = "0.6.5"
